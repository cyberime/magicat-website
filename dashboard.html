<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGICAT Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0b001a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:320px;
padding:25px;
background:rgba(255,255,255,0.05);
border-radius:15px;
box-shadow:0 0 20px #a100ff;
text-align:center;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#ff0055,#a100ff);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h2 data-i18n="dashboard"></h2>

<p>Email: <span id="email"></span></p>
<p>UID: <span id="uid"></span></p>

<button onclick="logout()" data-i18n="logout"></button>

</div>

<script type="module">
import { applyLang } from "./lang.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
  messagingSenderId: "ISI",
  appId: "ISI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* AUTO LOGIN */
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("email").innerText = user.email;
    document.getElementById("uid").innerText = user.uid;
  } else {
    window.location.href = "login.html";
  }
});

/* LOGOUT */
window.logout = function(){
signOut(auth).then(()=> {
  window.location.href="login.html";
});
};

document.addEventListener("DOMContentLoaded", applyLang);
</script>

</body>
</html>
