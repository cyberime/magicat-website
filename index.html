<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAGICAT</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="particles"></div>

<header>

<div class="logo">🐱 MAGICAT</div>

<nav>
<a href="#about">About</a>
<a href="#tokenomics">Tokenomics</a>
<a href="#roadmap">Roadmap</a>
</nav>

<div>
<button class="buy-btn" data-i18n="buy"></button>
<button onclick="goLogin()" data-i18n="login"></button>
<button onclick="goRegister()" data-i18n="register"></button>
</div>

</header>

<section class="hero">

<div class="moon"></div>

<img src="assets/cat.png" class="cat">

<div class="center">

<h1 data-i18n="welcome"></h1>

<p>
MAGICAT adalah meme coin komunitas dengan visi Web3 global.
</p>

<div class="hero-buttons">
<button data-i18n="join"></button>
</div>

</div>

</section>

<section class="stats">

<div class="stat-card">
<h2 class="counter" data-target="1234567">0</h2>
<span>Market Cap</span>
</div>

<div class="stat-card">
<h2 class="counter" data-target="54321">0</h2>
<span>Holders</span>
</div>

</section>

<footer>
MAGICAT © 2026
</footer>

<!-- 🔥 FIREBASE + AUTO LOGIN CHECK -->
<script type="module">
import { auth } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import { applyLang } from "./lang.js";

/* 🔐 AUTO LOGIN CHECK */
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});

/* 🌐 LANGUAGE APPLY */
document.addEventListener("DOMContentLoaded", () => {
  applyLang();
});

/* 🔗 NAVIGATION */
window.goLogin = function(){
  window.location.href = "login.html";
};

window.goRegister = function(){
  window.location.href = "register.html";
};
</script>

<script src="script.js"></script>

</body>
</html>
