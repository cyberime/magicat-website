<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAGICAT Register</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#0b001a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:320px;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:15px;
text-align:center;
box-shadow:0 0 20px #a100ff;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(45deg,#6d00ff,#c700ff);
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">

<h2 data-i18n="register"></h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()" data-i18n="register"></button>

<p><a href="login.html" data-i18n="login"></a></p>

</div>

<script type="module">
import { applyLang } from "./lang.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI",
  storageBucket: "ISI",
  messagingSenderId: "ISI",
  appId: "ISI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth, email, password)
.then(()=> window.location.href="login.html")
.catch(err=> alert(err.message));
};

document.addEventListener("DOMContentLoaded", applyLang);
</script>

</body>
</html>
